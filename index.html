<!DOCTYPE html>
<html lang="en">
<head>
<title>Vocab Study Tool</title>
<meta charset = "UTF-8">
<meta name = "description" content = "This is an AI-powered vocab study tool that generates a practice set form a list of words that you can upload.">
<link rel="stylesheet" href = "styles.css">

</head>
<body>
<h1>
  VOCAB STUDY TOOL | ENGLISH 1
</h1>
<p> 
    <strong>
    This is a study tool that uses OpenAI API to analyze your pasted text (in the form of a vocab list of some sort) and turns it into a set of fill-in-the-blank practice questions.
    </strong>
</p>
<form>
<label for="vocabList">Paste your words:</label>
<textarea id="vocabList" name="words" rows="10" cols="50"></textarea>
<button type="submit" id="b1">Generate</button>
</form>
<p id="output"></p>
<script type="module">
import OpenAI from "https://cdn.skypack.dev/openai";
const client = new OpenAI({
  apiKey: "sk-...", 
  dangerouslyAllowBrowser: true
});
const form = document.querySelector("form");
const textarea = document.getElementById("vocabList");
const output = document.getElementById("output");
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const text = textarea.value.trim();
  if (!text) return;

  output.innerText = "Generating...";
  try {
    const res = await client.responses.create({
      model: "gpt-5.3",
      input: `Turn this vocab list into fill-in-the-blank practice questions:\n${text}`,
    });    output.innerText = res.output[0].content[0].text;   } catch (err) {
    console.error(err);
    output.innerText = "Error generating response";
  }
});
</script>
</body>
</html>
